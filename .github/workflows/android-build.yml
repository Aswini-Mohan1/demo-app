name: Android Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Give permission to Gradle
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1

      - name: Wait before deletion
        run: |
          echo "Waiting..."
          sleep ${{ vars.DELETE_AFTER }}

      - name: Get Artifact ID
        id: get_artifact
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/actions/artifacts)

          ARTIFACT_ID=$(echo "$RESPONSE" | jq -r '.artifacts[] | select(.name=="app-release-apk") | .id' | head -n 1)

          echo "Found Artifact ID: $ARTIFACT_ID"

          if [ -z "$ARTIFACT_ID" ]; then
            echo "No artifact found!"
            exit 1
          fi

          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT

      - name: Delete Artifact
        run: |
          echo "Deleting artifact ID: ${{ steps.get_artifact.outputs.artifact_id }}"

          curl -X DELETE \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${{ steps.get_artifact.outputs.artifact_id }}
